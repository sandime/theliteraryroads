    <style>
        :root {
            --midnight-navy: #1A1B2E;
            --starlight-turquoise: #40E0D0;
            --atomic-orange: #FF4E00;
        }

        body {
            background-color: var(--midnight-navy);
            /* Subtle Map Grid Background */
            background-image: 
                linear-gradient(rgba(64, 224, 208, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(64, 224, 208, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            color: white;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: screen;
        }

        .neon-text {
            font-family: 'Bungee', cursive;
            color: #fff;
            text-align: center;
            line-height: 1.1;
            /* High-end Neon Glow */
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px var(--starlight-turquoise),
                0 0 30px var(--starlight-turquoise),
                0 0 40px var(--starlight-turquoise),
                0 0 55px var(--starlight-turquoise);
            animation: flicker 3s infinite alternate;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 
                    0 0 5px #fff,
                    0 0 10px #fff,
                    0 0 20px var(--starlight-turquoise),
                    0 0 30px var(--starlight-turquoise),
                    0 0 40px var(--starlight-turquoise);
            }
            20%, 24%, 55% {        
                text-shadow: none;
                opacity: 0.8;
            }
        }

        .tagline {
            font-family: 'Special Elite', cursive;
            color: var(--atomic-orange);
            letter-spacing: 1px;
        }

        .input-glow:focus {
            outline: none;
            box-shadow: 0 0 15px var(--starlight-turquoise);
            border-color: var(--starlight-turquoise);
        }

        /* Decorative "Teal Haze" Route Line in Background */
        .route-path {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            width: 150vw;
            height: 150px;
            background: var(--starlight-turquoise);
            filter: blur(100px);
            opacity: 0.12;
            z-index: -1;
        }

<!-- Email Signup (Now Active with Firebase) -->
<div class="w-full max-w-md">
    <p class="text-center text-xs uppercase tracking-widest mb-6 opacity-60">Get an invite to the first trip</p>
    <form id="signup-form" class="flex flex-col gap-4">
        <input 
            id="email-input"
            type="email" 
            placeholder="Enter your email..." 
            class="bg-black/40 border border-white/20 rounded-none px-6 py-4 w-full input-glow transition-all duration-300 text-center"
            required
        >
        <button 
            type="submit" 
            id="submit-btn"
            class="bg-transparent border-2 border-[#40E0D0] text-[#40E0D0] hover:bg-[#40E0D0] hover:text-[#1A1B2E] font-bold px-8 py-4 uppercase tracking-[0.2em] transition-all duration-300 active:scale-95"
        >
            Notify Me
        </button>
    </form>
    
   <!-- THIS IS THE NEW PART: It starts hidden with the 'hidden' class -->
    <p id="success-msg" class="tagline text-center mt-8 hidden text-xl animate-pulse">
        You're on the list, Navigator! <br>
        <span class="text-xs opacity-60 uppercase tracking-widest">See you on the road.</span>
    </p>
</div>
</div>

        
<!-- Firebase SDKs -->
<script type="module">
  // Import the functions you need from the SDKs
  import { initializeApp } from "https://www.gstatic.com";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com";

  // Double-check these keys match your Firebase Console "Project Settings"
  const firebaseConfig = {
  apiKey: "AIzaSyAg-y6Bx075pPTxUZ8giyzOojx_c61O4BM",
  authDomain: "the-literary-roads.firebaseapp.com",
  projectId: "the-literary-roads",
  storageBucket: "the-literary-roads.firebasestorage.app",
  messagingSenderId: "305145573086",
  appId: "1:305145573086:web:04a46d6d576ff01ec45c4f",
  measurementId: "G-GDKFFPQYLT"  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const form = document.getElementById('signup-form');
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('success-msg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const emailInput = document.getElementById('email-input');
    const email = emailInput.value;
    
    btn.innerText = "SENDING...";
    btn.disabled = true;

    try {
      await addDoc(collection(db, "waitlist"), {
        email: email,
        timestamp: serverTimestamp()
      });

      // 1. Hide the form so it disappears
      document.getElementById('signup-form').classList.add('hidden');
      
      // 2. Show the success message
      document.getElementById('success-msg').classList.remove('hidden');
      
      console.log("Success! Navigator added to the trail.");
    } catch (error) {
      console.error("Roadblock! ", error);
      alert("Something went wrong. Check your connection!");
    }
  });
</script>
